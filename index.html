<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts: preconnect early for fastest handshake -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload the key Inter font weights as actual font files for instant rendering -->
    <link rel="preload" href="https://fonts.gstatic.com/s/inter/v18/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuLyfAZ9hiJ-Ek-_EeA.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="https://fonts.gstatic.com/s/inter/v18/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuGKYAZ9hiJ-Ek-_EeA.woff2" as="font" type="font/woff2" crossorigin />
    <!-- Load Google Fonts CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <title>Vlas AESTHETIC Admin</title>
    <!-- Prevent FOUT: hide body until fonts are loaded, with fallback timeout -->
    <style>
      html { visibility: hidden; }
      html.fonts-loaded { visibility: visible; }
      /* Fallback: always show after 500ms even if fonts haven't loaded */
      @media (prefers-reduced-motion: no-preference) {
        html.fonts-loaded { animation: fontFadeIn 0.15s ease-out; }
        @keyframes fontFadeIn { from { opacity: 0.85; } to { opacity: 1; } }
      }
    </style>
    <script>
      // Use Font Loading API to detect when Inter is ready
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(function() {
          document.documentElement.classList.add('fonts-loaded');
        });
      }
      // Fallback: show content after 400ms max to avoid blank screen
      setTimeout(function() {
        document.documentElement.classList.add('fonts-loaded');
      }, 400);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
